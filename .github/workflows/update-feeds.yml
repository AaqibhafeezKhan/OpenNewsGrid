name: Update RSS Feeds Daily

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate RSS feeds
        run: |
          # This would run a script to validate all RSS feeds are accessible
          echo "Validating RSS feeds..."
          # node scripts/validate-feeds.js
        continue-on-error: true

      - name: Check for broken feeds
        run: |
          echo "Checking for broken RSS feeds..."
          # This would identify feeds that haven't responded recently
        continue-on-error: true

      - name: Create issue for broken feeds
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ RSS Feed Health Check Failed',
              body: 'Some RSS feeds are not responding. Please check the feed list.',
              labels: ['maintenance', 'rss-feeds']
            })
